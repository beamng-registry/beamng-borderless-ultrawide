[Window]
; Position and size of the borderless window.
;
; Default values span three 1920x1080 monitors:
;   left monitor  : -1920 →   -1
;   centre monitor:     0 → 1919
;   right monitor :  1920 → 3839
;
; Adjust these to match your own setup.
x=-1920
y=0
width=5760
height=1080

; Set to 1 to write a borderless.log next to the DLL for debugging.
debug=0
