name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Copy-Item build/Release/borderless.dll release-assets/
          Copy-Item build/Release/injector.exe release-assets/
          Copy-Item config.ini release-assets/
          Copy-Item README.md release-assets/
          Compress-Archive -Path release-assets/* -DestinationPath beamng-borderless-ultrawide-${{ github.ref_name }}.zip -Force

      - name: Publish release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          files: |
            build/Release/borderless.dll
            build/Release/injector.exe
            config.ini
            beamng-borderless-ultrawide-${{ github.ref_name }}.zip
